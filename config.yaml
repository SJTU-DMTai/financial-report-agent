pdf_style:
  base_color: "#1F4E79"
  body_font_path: "C:/Windows/Fonts/msyh.ttc"
  heading_font_path: "C:/Windows/Fonts/msyh.ttc"
  mono_font_path: "C:/Windows/Fonts/consola.ttf"


verify_config:
  max_verify_rounds: 2
  enable_multi_source_verification: True

wkhtmltopdf_path:
  path: /usr/local/bin/wkhtmltopdf

planner:
  max_evidences_per_segment: 6

evaluation:
  citation_extraction:
    openai-deepresearch:
      reference_section_pattern: '^\s*(?:#{1,6}\s*主要数据来源清单\s*$|\[(?:\*{1,2})?\[\d+\\?\](?:\*{1,2})?\]\()'
      citation_patterns:
        - match_pattern: '\[(?:\*{1,2})?\[\d+\\?\](?:\*{1,2})?\]\([^)]+\)'
          split_pattern: '\d+'
    ours:
      citation_patterns:
        - match_pattern: '\[\^cite_id:[^\]]+\]'
    gemini-deepresearch:
      reference_section_pattern: '^\s*#{1,6}\s*\*{0,2}引用的著作\*{0,2}\s*$'
      citation_patterns:
        - match_pattern: '(?<=[\u4e00-\u9fffA-Za-z）)])(?<!\d)\d{1,2}(?!\d)(?=[，。；：！？,.!?])'
        - match_pattern: '(?<=\s)(?<!\d)\d{1,2}(?!\d)(?=\s*\|)'
    finsight:
      reference_section_pattern: '^\s*#{1,6}\s*Reference Data Sources\s*$'
      citation_patterns:
        - match_pattern: '\[\d+(?:\s*,\s*\d+)*\]'
          split_pattern: '\d+'

